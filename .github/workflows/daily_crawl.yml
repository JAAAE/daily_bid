name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes (🌟 終極無腦覆蓋流，永不打架)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 1. 把剛剛爬蟲跑完、裝滿新資料的最新 Excel 先備份到系統暫存區 (/tmp)
        if [ -f "data/採購網_決標彙整.xlsx" ]; then
          cp data/採購網_決標彙整.xlsx /tmp/latest_excel.xlsx
        else
          echo "❌ 找不到爬蟲產出的 Excel 檔案！"
          exit 1
        fi
        
        # 2. 🔥 物理超渡衝突：直接強制抹除虛擬機裡所有的打架狀態，物理回歸雲端 main 的最純淨表面
        git reset --hard origin/main
        git pull origin main
        
        # 3. ⚡ 把真正剛爬好的最新 Excel 強行貼回來，冷酷壓過去覆蓋！
        cp /tmp/latest_excel.xlsx data/採購網_決標彙整.xlsx
        
        # 4. 重新追蹤並推網，這在 Git 的眼裡只是單純的檔案內容修改，百分之百不會觸發 Conflict！
        git add data/採購網_決標彙整.xlsx
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自動定時更新決標 Excel: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "✨ 資料與雲端最新版比對後完全無變動，跳過更新。"
        fi
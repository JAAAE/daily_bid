name: Daily Procurement Crawler

on:
  schedule:
    # 每天 台灣時間下午 17:00 執行
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 💡 讀取完整歷史

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 💡 ✨ 終極修復邏輯：先把剛剛機器人跑好、但引發衝突的本地變更清除
        git stash || true
        
        # 💡 重新拉取 GitHub 雲端上最新被你推上去的版本，確保同步
        git pull origin main --rebase
        
        # 💡 把剛剛跑好的 Excel 還原回來覆蓋
        git stash pop || true
        
        # 重新強制追蹤
        git add data/採購網_決標彙整.xlsx
        
        # 如果檔案真的有變動，直接 Commit 並強制順推
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自動更新決標資料: $(date +'%Y-%m-%d')"
          git push origin main
        else
          echo "✨ 資料完全無變動，跳過更新。"
        fi
name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      # 💡 移除寫死的 C:\ 絕對路徑，改用標準呼叫，讓 GitHub Runner 自動去 Path 找
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 1. 檢查檔案是否存在
        if [ -f "data/採購網_決標彙整.xlsx" ]; then
          cp "data/採購網_決標彙整.xlsx" ../latest_excel.xlsx
        else
          echo "❌ 找不到爬蟲產出的 Excel 檔案！"
          exit 1
        fi
        
        # 2. 清除潛在衝突
        git reset --hard origin/main
        git pull origin main
        
        # 3. 確保資料夾存在並貼回最新檔案
        mkdir -p data
        cp ../latest_excel.xlsx "data/採購網_決標彙整.xlsx"
        
        # 4. 重新追蹤並推回雲端
        git add "data/採購網_決標彙整.xlsx"
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自動定時更新決標 Excel: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "✨ 資料與雲端最新版比對後完全無變動，跳過更新。"
        fi
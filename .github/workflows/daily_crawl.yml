name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      # 💡 直接使用 Windows 實體機原生最擅長的 PowerShell，100% 避開 WSL 衝突
      shell: powershell
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 1. 檢查檔案是否存在 (配合你 Python 真正產出的資料夾名稱 'dataa')
        if (Test-Path "dataa\採購網_決標彙整.xlsx") {
            # 複製到專案目錄的上一層作為暫存備份，防止 Git 切換分支時檔案被沖掉
            Copy-Item "dataa\採購網_決標彙整.xlsx" -Destination "..\latest_excel.xlsx" -Force
            Write-Host "✅ 成功將最新 Excel 備份至暫存區"
        } else {
            Write-Error "❌ 找不到爬蟲產出的 Excel 檔案！請檢查 Python 中的 DATA_DIR 名稱"
            exit 1
        }
        
        # 2. 清除潛在衝突，強制對齊雲端最新進度
        git reset --hard origin/main
        git pull origin main
        
        # 3. 確保 dataa 資料夾存在，並把最新檔案貼回來覆蓋
        if (!(Test-Path "dataa")) { New-Item -ItemType Directory -Path "dataa" }
        Copy-Item "..\latest_excel.xlsx" -Destination "dataa\採購網_決標彙整.xlsx" -Force
        
        # 4. 重新追蹤並推回雲端
        git add "dataa/採購網_決標彙整.xlsx"
        $status = git status --porcelain
        if ($status) {
            $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            git commit -m "🤖 自動定時更新決標 Excel: $currentDate"
            git push origin main
            Write-Host "🚀 成功將更新後的 Excel 推回 GitHub 雲端！"
        } else {
            Write-Host "✨ 資料與雲端最新版比對後完全無變動，跳過更新。"
        }
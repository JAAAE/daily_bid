name: Daily Procurement Crawler

on:
  schedule:
    # 每天 台灣時間下午 17:00 執行
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 💡 ✨ 終極暴力破局：先把虛擬機新爬好、真正的 Excel 檔案複製一份到記憶體/暫存區
        cp data/採購網_決標彙整.xlsx /tmp/latest_excel.xlsx
        
        # 強制放棄本地所有因為爬蟲產生的暫存變更，回到跟雲端完全一致的乾淨狀態
        git reset --hard origin/main
        
        # 重新向雲端拉取最新進度，確保絕對同步不噴錯
        git pull origin main
        
        # 把剛剛在虛擬機裡真正爬好的最新 Excel 檔案強行貼回來覆蓋
        cp /tmp/latest_excel.xlsx data/採購網_決標彙整.xlsx
        
        # 重新強制追蹤
        git add data/採購網_決標彙整.xlsx
        
        # 如果檔案真的有新資料變動，直接 Commit 並無痛順推
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自動更新決標資料: $(date +'%Y-%m-%d')"
          git push origin main
        else
          echo "✨ 資料完全無變動，跳過更新。"
        fi
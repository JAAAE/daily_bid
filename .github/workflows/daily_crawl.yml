name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      shell: powershell
      run: |
        Write-Host "Step 1: Searching and rescuing Excel file before Git reset..."
        
        # 1. 地毯式搜尋整個工作區內的目標 Excel 檔案
        $matchedFile = Get-ChildItem -Path . -Filter "採購網_決標彙整.xlsx" -Recurse | Select-Object -First 1
        
        if ($matchedFile) {
            $realPath = $matchedFile.FullName
            Write-Host "✅ Target file caught at: $realPath"
            
            # 複製到工作目錄的「上一層」（Git 鎖不到的地方）
            Copy-Item $realPath -Destination "..\latest_excel.xlsx" -Force
            Write-Host "💾 File safely evacuated outside Git repository."
        } else {
            Write-Error "❌ Error: Cannot find Excel file before Git reset. Check Python output."
            exit 1
        }
        
        Write-Host "Step 2: Cleaning up Git environment..."
        # 初始化 Git 設定
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 強制對齊雲端最新進度
        git reset --hard origin/main
        git pull origin main
        
        Write-Host "Step 3: Restoring Excel file and preparing to push..."
        # 確保 data 資料夾存在
        if (!(Test-Path "data")) { 
            New-Item -ItemType Directory -Path "data" | Out-Null
        }
        
        # 把撤離的檔案貼回到正規的 data 資料夾下
        Copy-Item "..\latest_excel.xlsx" -Destination "data\採購網_決標彙整.xlsx" -Force
        
        # 4. 重新追蹤並推回雲端
        git add "data/採購網_決標彙整.xlsx"
        $status = git status --porcelain
        if ($status) {
            $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            # 💡 這裡的 Commit Message 包含中文字是沒問題的，因為它是傳給 Git 而不是被 PowerShell 直接執行
            git commit -m "🤖 自動定時更新決標 Excel: $currentDate"
            git push origin main
            Write-Host "🚀 Success! Excel updated and pushed to GitHub successfully!"
        } else {
            Write-Host "✨ No changes detected. Skipping git commit."
        }
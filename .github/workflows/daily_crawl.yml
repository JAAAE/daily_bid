name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      shell: powershell
      run: |
        Write-Host "Step 1: Searching and rescuing Excel file..."
        #  blind search 盲搜
        $matchedFile = Get-ChildItem -Path . -Filter "*.xlsx" -Recurse | Select-Object -First 1
        
        if ($matchedFile) {
            # 複製到工作目錄的「上一層」避難
            Copy-Item $matchedFile.FullName -Destination "..\temp_output.xlsx" -Force
            Write-Host "✅ File safely evacuated outside Git."
        } else {
            Write-Error "❌ Error: Truly NO .xlsx file found!"
            exit 1
        }
        
        Write-Host "Step 2: Cleaning up Git environment..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git reset --hard origin/main
        git pull origin main
        
        Write-Host "Step 3: Restoring Excel file using Python (Anti-Moji-Bake)..."
        # 💡 核心大絕招：用 Windows 聽得懂的 Python 來負責把英文暫存檔「正名」回中文，100% 不會亂碼！
        python -c "import os, shutil; os.makedirs('data', exist_ok=True); shutil.copy('../temp_output.xlsx', os.path.join('data', '採購網_決標彙整.xlsx'))"
        
        Write-Host "Step 4: Pushing changes back to GitHub..."
        # 💡 Git 追蹤時，直接用萬用字元（*.xlsx）或者是資料夾名稱（data/），再次避開在 yml 裡寫中文！
        git add data/
        
        $status = git status --porcelain
        if ($status) {
            # 為了防亂碼，Commit message 先改用英文時間戳
            $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            git commit -m "🤖 Auto-updated Tender Excel: $currentDate"
            git push origin main
            Write-Host "🚀 FINALLY SUCCESS! Excel updated and pushed to GitHub cloud!"
        } else {
            Write-Host "✨ No changes detected. Skipping git commit."
        }
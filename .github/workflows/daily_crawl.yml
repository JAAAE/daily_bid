name: Daily Procurement Crawler

on:
  schedule:
    # 每天 UTC 9:00 執行 (等於台灣時間下午 05:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/採購網_決標彙整.xlsx
        # 只有在檔案有變動時才 commit，避免 workflow 報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新決標資料: $(date +'%Y-%m-%d')" && git push)
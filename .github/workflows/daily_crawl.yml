name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      shell: powershell
      run: |
        Write-Host "Step 1: Searching and rescuing ANY Excel file before Git reset..."
        
        # 💡 終極修正：不比對中文檔名，直接盲搜工作區內所有字尾是 .xlsx 的檔案
        $matchedFile = Get-ChildItem -Path . -Filter "*.xlsx" -Recurse | Select-Object -First 1
        
        if ($matchedFile) {
            $realPath = $matchedFile.FullName
            Write-Host "✅ Target Excel file captured at: $realPath"
            
            # 複製到工作目錄的「上一層」，並強制重新命名為一個乾淨的英文檔名
            Copy-Item $realPath -Destination "..\temp_output.xlsx" -Force
            Write-Host "💾 File safely evacuated outside Git repository."
        } else {
            # 如果真的連一個 .xlsx 都沒有，印出當前目錄結構幫忙排查
            Write-Host "❌ Error: Truly NO .xlsx file found in workspace! Current directory tree:"
            Get-ChildItem -Recurse | Select-Object FullName
            Write-Error "Cannot find any Excel file before Git reset. Check Python output."
            exit 1
        }
        
        Write-Host "Step 2: Cleaning up Git environment..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 強制對齊雲端最新進度 (會沖刷掉未追蹤的檔案)
        git reset --hard origin/main
        git pull origin main
        
        Write-Host "Step 3: Restoring Excel file with correct standard path..."
        # 確保 data 資料夾存在
        if (!(Test-Path "data")) { 
            New-Item -ItemType Directory -Path "data" | Out-Null
        }
        
        # 💡 把剛剛逃難成功的英文暫存檔，貼回來並「正名」為正確的中文名稱！
        # 在這裡由 PowerShell 本地賦予它名字，能保證推上雲端時一定是對的中文
        Copy-Item "..\temp_output.xlsx" -Destination "data\採購網_決標彙整.xlsx" -Force
        
        # 4. 重新追蹤並推回雲端
        git add "data/採購網_決標彙整.xlsx"
        $status = git status --porcelain
        if ($status) {
            $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            git commit -m "🤖 自動定時更新決標 Excel: $currentDate"
            git push origin main
            Write-Host "🚀 Success! Excel updated and pushed to GitHub successfully!"
        } else {
            Write-Host "✨ No changes detected. Skipping git commit."
        }
name: Daily Procurement Trigger

on:
  schedule:
    # 每天台灣時間下午 17:05 定時執行 (UTC 9:05)
    - cron: '5 9 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  trigger_streamlit:
    runs-on: ubuntu-latest

    steps:
    - name: Wake up Streamlit and Trigger Live Crawl
      run: |
        # 💡 用 curl 連線你的 Streamlit 網頁，逼迫網頁在背景執行純淨的 API 補齊與 Excel 回寫！
        # 🌟 請將下方的網址替換為你真正的 Streamlit 網頁網址 🌟
        curl -sL "https://daily-bid.streamlit.app" > /dev/null
        echo "🚀 已成功觸發 Streamlit 雲端背景爬蟲，資料庫回補閉環完成！"
name: Daily Procurement Crawler

on:
  schedule:
    - cron: '0 9 * * *' # 每天台灣時間下午 17:00 執行
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python (🌟 徹底拔除 Cache 污染)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 💡 這裡絕對不要寫 cache: 'pip'，確保每次都是百分之百純淨的全新環境

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes (🌟 乾淨無腦覆蓋流)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 1. 確保拿到最新的 Excel 實體
        if [ -f "data/採購網_決標彙整.xlsx" ]; then
          cp data/採購網_決標彙整.xlsx /tmp/latest_excel.xlsx
        else
          echo "❌ 找不到爬蟲產出的 Excel 檔案！"
          exit 1
        fi
        
        # 2. 強制洗掉虛擬機裡所有的幽靈暫存狀態，物理回歸 GitHub 最真實的分支
        git reset --hard origin/main
        git pull origin main
        
        # 3. 把真正現爬好、最完整的 Excel 強行貼回來覆蓋
        cp /tmp/latest_excel.xlsx data/採購網_決標彙整.xlsx
        
        # 4. 強制推網
        git add data/採購網_決標彙整.xlsx
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "🤖 自動更新決標資料: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        else
          echo "✨ 資料與雲端最新版比對後完全無變動，跳過更新。"
        fi
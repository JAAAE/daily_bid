name: Daily Procurement Trigger

on:
  schedule:
    # 每天台灣時間下午 17:05 定時執行 (UTC 9:05)
    - cron: '5 9 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  trigger_streamlit:
    runs-on: ubuntu-latest

    steps:
    - name: Wake up Streamlit with Browser Disguise (🌟 頂級瀏覽器偽裝穿透 WAF)
      run: |
        # 💡 塞入 Chrome 瀏覽器的 User-Agent 與認證標頭，完美繞過 WAF 防火牆攔截
        # 🌟 請將下方的網址替換為你真正的 Streamlit 網頁網址 🌟
        curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
             -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
             -H "Accept-Language: zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7" \
             --compressed \
             -sL "https://daily-bid.streamlit.app" > /dev/null
             
        echo "🚀 成功偽裝成瀏覽器穿透防火牆！Streamlit 背景爬蟲已啟動，Excel 回補閉環完成！"
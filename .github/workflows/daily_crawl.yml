name: Daily Procurement Crawler

on:
  schedule:
    # 每天台灣時間下午 17:00 自動執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write
  actions: write

jobs:
  crawl_and_update:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # 讀取完整歷史紀錄

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests urllib3

    - name: Run Crawler
      env:
        PYTHONUNBUFFERED: '1' # 💡 強制 Python 拋棄緩衝區，讓 GitHub Actions 即時噴出 Done 日誌！
      run: python crawler.py

    - name: Commit and Push Changes
      shell: powershell
      run: |
        Write-Host "第一步：🚀 在 Git 清算前，緊急搶救並搜尋 Excel 檔案..."
        
        # 1. 地毯式搜尋整個工作區內的目標 Excel 檔案
        $matchedFile = Get-ChildItem -Path . -Filter "採購網_決標彙整.xlsx" -Recurse | Select-Object -First 1
        
        if ($matchedFile) {
            $realPath = $matchedFile.FullName
            Write-Host "✅ 成功攔截檔案！路徑為: $realPath"
            
            # 立刻複製到工作目錄的「上一層」（Git 鎖不到的地方）
            Copy-Item $realPath -Destination "..\latest_excel.xlsx" -Force
            Write-Host "💾 檔案已安全撤離至 Git 管轄範圍外。"
        } else {
            Write-Error "❌ 錯誤：在 Git 重置前就已經找不到 Excel 檔案！請確認 Python 是否真的有存檔成功。"
            exit 1
        }
        
        Write-Host "第二步：🧹 開始清理 Git 環境..."
        # 初始化 Git 設定
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 此時可以放心地 reset 了，最新 Excel 已經在安全的地方（..\latest_excel.xlsx）
        git reset --hard origin/main
        git pull origin main
        
        Write-Host "第三步：🚚 將 Excel 檔案歸位並準備推送..."
        # 💡 這裡已經修正為單個 a 的 'data' 資料夾
        if (!(Test-Path "data")) { 
            New-Item -ItemType Directory -Path "data" | Out-Null
        }
        
        # 把撤離的檔案貼回到正規的 data 資料夾下
        Copy-Item "..\latest_excel.xlsx" -Destination "data\採購網_決標彙整.xlsx" -Force
        
        # 4. 重新追蹤並推回雲端
        git add "data/採購網_決標彙整.xlsx"
        $status = git status --porcelain
        if ($status) {
            $currentDate = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            git commit -m "🤖 自動定時更新決標 Excel: $currentDate"
            git push origin main
            Write-Host "🎉 終極成功！Excel 資料已完美推回 GitHub 雲端的 data/ 目錄下！"
        } else {
            Write-Host "✨ 資料與雲端最新版比對後完全無變動，跳過更新。"
        }